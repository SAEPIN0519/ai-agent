<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIsoraCode タスクボード</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --primary: #3D5AFE;
      --primary-dark: #1939B7;
      --accent: #00BCD4;
      --bg: #F8FAFF;
      --bg-dark: #EEF2FF;
      --white: #FFFFFF;
      --text: #1A1A2E;
      --text-muted: #5C6BC0;
      --border: rgba(61, 90, 254, 0.12);
      --shadow: 0 4px 24px rgba(61, 90, 254, 0.1);
      --radius: 16px;
      --radius-sm: 8px;

      --saeka-color: #3D5AFE;
      --saeka-bg: #EEF2FF;
      --aosy-color: #0ea5e9;
      --aosy-bg: #e0f2fe;
      --both-color: #8b5cf6;
      --both-bg: #f3e8ff;

      --success: #4CAF50;
      --warn: #FF9800;
      --danger: #F44336;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* スクロールプログレスバー */
    .scroll-indicator {
      position: fixed; top: 0; left: 0;
      height: 3px; background: var(--primary);
      z-index: 200; width: 0%; transition: width 0.1s;
    }

    /* ナビゲーション */
    #mainNav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #mainNav.scrolled {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--accent); }
    #mainNav.scrolled .nav-logo { color: var(--text); }
    .nav-badge {
      font-size: 0.75rem;
      background: rgba(255,255,255,0.15);
      color: var(--white);
      padding: 4px 12px;
      border-radius: 999px;
      font-weight: 500;
    }
    #mainNav.scrolled .nav-badge {
      background: var(--bg-dark);
      color: var(--text-muted);
    }

    /* Hero */
    .hero {
      min-height: 40vh;
      display: flex; align-items: center;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #3D5AFE 100%);
      position: relative; overflow: hidden;
      padding: 100px 24px 80px;
    }
    .hero-blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .blob1 { width: 400px; height: 400px; background: #00BCD4; top: -100px; right: -50px; }
    .blob2 { width: 300px; height: 300px; background: #7C4DFF; bottom: -80px; left: 10%; animation-delay: -3s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    .hero-inner {
      max-width: 860px; margin: 0 auto; width: 100%;
      position: relative; z-index: 1;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700; color: #fff;
      line-height: 1.2; word-break: keep-all;
      margin-bottom: 0.5rem;
    }
    .hero h1 span { color: var(--accent); }
    .hero-sub {
      color: rgba(255,255,255,0.6);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    /* 進捗サマリー */
    .progress-summary {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .prog-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1.25rem;
      color: #fff;
    }
    .prog-card .num {
      font-size: 1.5rem; font-weight: 700;
      line-height: 1;
    }
    .prog-card .label { font-size: 0.72rem; opacity: 0.7; margin-top: 2px; }
    .prog-bar {
      margin-top: 1.5rem;
      background: rgba(255,255,255,0.15);
      border-radius: 999px; height: 6px; overflow: hidden;
      max-width: 400px;
    }
    .prog-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      transition: width 0.5s ease;
    }

    /* ウェーブ */
    .wave { line-height: 0; }
    .wave svg { display: block; width: 100%; height: 60px; }

    /* メインコンテンツ */
    .main {
      max-width: 860px; margin: 0 auto;
      padding: 2rem 24px 4rem;
    }

    /* フィルタタブ */
    .filter-tabs {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: 6px 16px; border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: inherit; font-size: 0.8rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* セクションラベル */
    .section-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 1.5rem 0 0.75rem;
    }
    .section-label:first-of-type { margin-top: 0; }

    /* タスクカード */
    .task-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .task-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex; align-items: flex-start; gap: 1rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s, background 0.3s;
    }
    .task-card:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(61,90,254,0.13); }
    .task-card.done {
      background: #f0fdf4; border-color: #86efac;
      opacity: 0.7;
    }
    .task-card.hidden { display: none; }

    /* チェックボックス */
    .checkbox {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px; cursor: pointer;
      flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .checkbox .material-icons { font-size: 14px; display: none; color: #fff; }
    .checkbox.checked { background: var(--success); border-color: var(--success); }
    .checkbox.checked .material-icons { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 0.95rem; font-weight: 500;
      line-height: 1.5; margin-bottom: 0.3rem;
      word-break: keep-all; overflow-wrap: anywhere;
    }
    .done .task-title { text-decoration: line-through; color: #166534; }
    .task-sub {
      font-size: 0.78rem; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 0.5rem;
    }

    .task-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }

    .badge {
      font-size: 0.7rem; padding: 2px 10px;
      border-radius: 999px; font-weight: 600;
      white-space: nowrap;
    }
    .badge.saeka { background: var(--saeka-bg); color: var(--saeka-color); }
    .badge.aosy  { background: var(--aosy-bg);  color: var(--aosy-color); }
    .badge.both  { background: var(--both-bg);  color: var(--both-color); }

    .deadline-tag {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.7rem; color: var(--text-muted);
    }
    .deadline-tag .material-icons { font-size: 12px; }
    .deadline-tag.near { color: var(--warn); font-weight: 600; }
    .deadline-tag.over { color: var(--danger); font-weight: 600; }

    /* フッター */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* スクロールアニメーション */
    .fi {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fi.visible { opacity: 1; transform: translateY(0); }
    .fi.delay-1 { transition-delay: 0.05s; }
    .fi.delay-2 { transition-delay: 0.1s; }
    .fi.delay-3 { transition-delay: 0.15s; }

    @media (max-width: 600px) {
      #mainNav { padding: 14px 20px; }
      .hero { padding: 90px 20px 60px; }
      .main { padding: 1.5rem 16px 3rem; }
      .task-card { padding: 0.875rem 1rem; }
    }
  </style>
</head>
<body>

<div class="scroll-indicator" id="scrollBar"></div>

<nav id="mainNav">
  <a href="#" class="nav-logo">AIsora<span>Code</span></a>
  <span class="nav-badge" id="navBadge">0 / 9 完了</span>
</nav>

<section class="hero">
  <div class="hero-blob blob1"></div>
  <div class="hero-blob blob2"></div>
  <div class="hero-inner">
    <h1>タスク<span>ボード</span></h1>
    <p class="hero-sub">議事録より 2026-03-22 作成</p>
    <div class="progress-summary">
      <div class="prog-card">
        <div class="num" id="doneCount">0</div>
        <div class="label">完了</div>
      </div>
      <div class="prog-card">
        <div class="num" id="remainCount">9</div>
        <div class="label">残り</div>
      </div>
      <div class="prog-card">
        <div class="num" id="nearCount">0</div>
        <div class="label">期限間近</div>
      </div>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="heroFill" style="width: 0%"></div>
    </div>
  </div>
</section>

<div class="wave" style="background: var(--bg);">
  <svg viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,30 C180,60 360,0 540,30 C720,58 900,8 1080,30 C1200,46 1360,18 1440,28 L1440,60 L0,60 Z" fill="#F8FAFF"/>
  </svg>
</div>

<main class="main">
  <div class="filter-tabs">
    <button class="tab-btn active" data-filter="all">すべて</button>
    <button class="tab-btn" data-filter="saeka">SAEKA</button>
    <button class="tab-btn" data-filter="aosy">AOSY</button>
    <button class="tab-btn" data-filter="both">SAEKA + AOSY</button>
    <button class="tab-btn" data-filter="done">完了済み</button>
  </div>

  <div class="task-list" id="taskList"></div>
</main>

<footer>AIsoraCode &copy; 2026 — SAEKA &amp; AOSY</footer>

<script>
  const tasks = [
    {
      id: 1,
      title: "マネタイズ後の報酬分配ルールを決める",
      sub: "",
      who: "both",
      whoLabel: "SAEKA + AOSY",
      deadline: "2026-04-10"
    },
    {
      id: 2,
      title: "AIsoraCode単独 or KOKONOE統合を検討・税理士に相談",
      sub: "",
      who: "saeka",
      whoLabel: "SAEKA",
      deadline: "2026-04-01"
    },
    {
      id: 3,
      title: "サービス内容を確定する",
      sub: "",
      who: "aosy",
      whoLabel: "AOSY",
      deadline: "2026-03-30"
    },
    {
      id: 4,
      title: "モニタリング対象者と価格（妥当性）を決める",
      sub: "",
      who: "saeka",
      whoLabel: "SAEKA",
      deadline: null
    },
    {
      id: 5,
      title: "教える内容を決める（Claude Codeを手元で動かせる状態）",
      sub: "必要ツール準備・ガードレール整理・ビジョン整理・ポートフォリオ1個作成を含む",
      who: "aosy",
      whoLabel: "AOSY",
      deadline: "2026-03-30"
    },
    {
      id: 6,
      title: "スタート時期・モニタリング開始日・ゴールを決める",
      sub: "",
      who: "both",
      whoLabel: "SAEKA + AOSY",
      deadline: "2026-03-30"
    },
    {
      id: 7,
      title: "オープンチャットを準備する",
      sub: "",
      who: "saeka",
      whoLabel: "SAEKA",
      deadline: "2026-04-01"
    },
    {
      id: 8,
      title: "Peatixを準備する",
      sub: "",
      who: "aosy",
      whoLabel: "AOSY",
      deadline: "2026-04-15"
    },
    {
      id: 9,
      title: "勉強会・ウェビナー企画 + 営業フロー設計",
      sub: "Discord連携・Google Calendar連携・GAS連携（アップセル）を含む",
      who: "both",
      whoLabel: "SAEKA + AOSY",
      deadline: null
    }
  ];

  const saved = JSON.parse(localStorage.getItem("aisoracode-tasks") || "{}");
  const today = new Date(); today.setHours(0, 0, 0, 0);
  let currentFilter = "all";

  function deadlineInfo(dateStr) {
    if (!dateStr) return { cls: "", label: "随時" };
    const d = new Date(dateStr);
    const diff = Math.floor((d - today) / 86400000);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    if (diff < 0) return { cls: "over", label: `${label} 期限超過` };
    if (diff <= 5) return { cls: "near", label: `${label} まもなく` };
    return { cls: "", label };
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, i) => {
      const done = !!saved[task.id];
      const dl = deadlineInfo(task.deadline);

      const card = document.createElement("div");
      card.className = `task-card fi delay-${(i % 3) + 1}${done ? " done" : ""}`;
      card.dataset.who = task.who;
      card.dataset.done = done ? "1" : "0";

      // フィルタ適用
      if (currentFilter !== "all") {
        if (currentFilter === "done" && !done) card.classList.add("hidden");
        else if (currentFilter !== "done" && task.who !== currentFilter) card.classList.add("hidden");
      }

      card.innerHTML = `
        <div class="checkbox${done ? " checked" : ""}" onclick="toggleTask(${task.id})">
          <span class="material-icons">check</span>
        </div>
        <div class="task-body">
          <div class="task-title">${task.title}</div>
          ${task.sub ? `<div class="task-sub">${task.sub}</div>` : ""}
          <div class="task-meta">
            <span class="badge ${task.who}">${task.whoLabel}</span>
            <span class="deadline-tag ${dl.cls}">
              <span class="material-icons">schedule</span>${dl.label}
            </span>
          </div>
        </div>
      `;
      list.appendChild(card);
    });

    updateStats();
    initObserver();
  }

  function updateStats() {
    const done = tasks.filter(t => !!saved[t.id]).length;
    const total = tasks.length;
    const near = tasks.filter(t => {
      if (saved[t.id] || !t.deadline) return false;
      const d = new Date(t.deadline);
      return Math.floor((d - today) / 86400000) <= 5;
    }).length;

    const pct = Math.round((done / total) * 100);
    document.getElementById("doneCount").textContent = done;
    document.getElementById("remainCount").textContent = total - done;
    document.getElementById("nearCount").textContent = near;
    document.getElementById("heroFill").style.width = pct + "%";
    document.getElementById("navBadge").textContent = `${done} / ${total} 完了`;
  }

  function toggleTask(id) {
    saved[id] = !saved[id];
    localStorage.setItem("aisoracode-tasks", JSON.stringify(saved));
    renderTasks();
  }

  // フィルタタブ
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderTasks();
    });
  });

  // スクロールプログレスバー
  const scrollBar = document.getElementById("scrollBar");
  window.addEventListener("scroll", () => {
    const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
    scrollBar.style.width = scrolled + "%";
  }, { passive: true });

  // ナビスクロール変化
  const mainNav = document.getElementById("mainNav");
  window.addEventListener("scroll", () => {
    mainNav.classList.toggle("scrolled", window.scrollY > 40);
  }, { passive: true });

  // Intersection Observer
  function initObserver() {
    const items = Array.from(document.querySelectorAll(".fi"));
    const show = el => el.classList.add("visible");
    if (!("IntersectionObserver" in window)) { items.forEach(show); return; }
    const io = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { show(entry.target); observer.unobserve(entry.target); }
      });
    }, { threshold: 0.06 });
    items.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight * 0.92) show(el);
      else io.observe(el);
    });
  }

  renderTasks();
</script>

</body>
</html>
