<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>更新型進捗管理ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI','Meiryo',sans-serif; background:#0f1923; color:#e0e0e0; }

.header {
  background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 100%);
  padding: 14px 24px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 2px solid #2196F3;
}
.header h1 { font-size: 22px; color: #64b5f6; }
.header .date { color: #90a4ae; font-size: 14px; }

/* KPI */
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 14px 24px; }
.kpi-row-status { display: grid; grid-template-columns: repeat(11, 1fr); gap: 8px; padding: 0 24px 14px; }
.kpi-sm {
  background: #1a2a3a; border-radius: 6px; padding: 8px 4px; text-align: center;
  border-top: 3px solid #666;
}
.kpi-sm .label { font-size: 10px; color: #b0bec5; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kpi-sm .value { font-size: 22px; font-weight: 700; color: #e0e0e0; }
.kpi-card {
  background: #1a2a3a; border-radius: 8px; padding: 12px; text-align: center;
  border-left: 4px solid #2196F3;
}
.kpi-card.danger { border-left-color: #f44336; }
.kpi-card.warning { border-left-color: #ff9800; }
.kpi-card.success { border-left-color: #4caf50; }
.kpi-card .label { font-size: 13px; color: #90a4ae; margin-bottom: 2px; }
.kpi-card .value { font-size: 34px; font-weight: 700; color: #64b5f6; }
.kpi-card.danger .value { color: #f44336; }
.kpi-card.warning .value { color: #ff9800; }
.kpi-card.success .value { color: #4caf50; }

/* Charts */
.charts-row { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; padding: 0 24px 14px; }
.charts-row-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 24px 14px; }
.chart-box {
  background: #1a2a3a; border-radius: 8px; padding: 14px;
  position: relative;
}
.chart-box h3 { font-size: 15px; color: #90a4ae; margin-bottom: 8px; }
.chart-wrap { position: relative; height: 260px; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; padding: 0 24px; }
.tab {
  padding: 8px 20px; background: #1a2a3a; border: none; color: #90a4ae;
  border-radius: 6px 6px 0 0; cursor: pointer; font-size: 15px;
}
.tab.active { background: #263544; color: #64b5f6; font-weight: 600; }

/* Table */
.table-area {
  background: #263544; margin: 0 24px 24px; border-radius: 0 8px 8px 8px; padding: 14px;
}
.filters { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input {
  background: #1a2a3a; color: #e0e0e0; border: 1px solid #37474f;
  padding: 6px 10px; border-radius: 4px; font-size: 14px;
}
.filters input { width: 200px; }
.filters label { font-size: 13px; color: #90a4ae; }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: #1a2a3a; color: #90a4ae; padding: 7px 5px; text-align: left;
  position: sticky; top: 0; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid #37474f;
}
.data-table th:hover { color: #64b5f6; }
.data-table td { padding: 5px; border-bottom: 1px solid #2a3a4a; }
.data-table tr:hover { background: #1e3348; }
.table-scroll { max-height: 400px; overflow-y: auto; }

.badge {
  display: inline-block; padding: 2px 7px; border-radius: 10px;
  font-size: 12px; font-weight: 500; white-space: nowrap;
}
.badge.early { background: #1b5e20; color: #a5d6a7; }
.badge.mid { background: #e65100; color: #ffcc80; }
.badge.late { background: #4a148c; color: #ce93d8; }
.badge.other { background: #37474f; color: #b0bec5; }

.overdue-high { color: #f44336; font-weight: 700; }
.overdue-mid { color: #ff9800; font-weight: 600; }
.overdue-low { color: #fdd835; }

.action-tag {
  display: inline-block; padding: 1px 5px; border-radius: 3px;
  font-size: 11px; font-weight: 700; margin-left: 3px;
}
.action-tag.urgent { background: #f44336; color: #fff; }
.action-tag.watch { background: #ff9800; color: #fff; }

.kanryo-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 12px; font-weight: 600;
}
.kanryo-badge.done { background: #1b5e20; color: #a5d6a7; }
.kanryo-badge.active { background: #0d47a1; color: #90caf9; }

@media (max-width: 1000px) {
  .kpi-row { grid-template-columns: repeat(3,1fr); }
  .charts-row, .charts-row-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>更新型進捗管理ダッシュボード</h1>
  <div class="date" id="updateDate"></div>
</div>

<div class="kpi-row" id="kpiRow"></div>
<div class="kpi-row-status" id="kpiStatusRow"></div>

<div class="charts-row">
  <div class="chart-box">
    <h3>担当別 案件数（進行中）</h3>
    <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>担当別 ステータス構成（進行中）</h3>
    <div class="chart-wrap"><canvas id="stackedChart"></canvas></div>
  </div>
</div>

<div class="charts-row-3">
  <div class="chart-box">
    <h3>担当別 負荷状況（遅れ / その他）</h3>
    <div class="chart-wrap"><canvas id="loadChart"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>ステータス別 件数（進行中）</h3>
    <div class="chart-wrap"><canvas id="statusPie"></canvas></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('action')">要アクション</button>
  <button class="tab" onclick="switchTab('overdue')">期日遅れ一覧</button>
  <button class="tab" onclick="switchTab('active')">進行中</button>
  <button class="tab" onclick="switchTab('done')">完了</button>
  <button class="tab" onclick="switchTab('all')">全データ</button>
</div>

<div class="table-area">
  <div class="filters">
    <label>担当: <select id="filterTantou"><option value="">全て</option></select></label>
    <label>ステータス: <select id="filterStatus"><option value="">全て</option></select></label>
    <label>客先: <select id="filterKyakusaki"><option value="">全て</option></select></label>
    <label>状態: <select id="filterKanryo"><option value="">全て</option><option value="進行中">進行中</option><option value="完了">完了</option></select></label>
    <label>検索: <input type="text" id="filterText" placeholder="品番・品名で検索..."></label>
    <span id="resultCount" style="color:#90a4ae;font-size:14px;"></span>
  </div>
  <div class="table-scroll">
    <table class="data-table">
      <thead><tr id="tableHead"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

// 主要担当の正規化
const MAIN_TANTOU = ['若山','浦上','田中','山北','西川','舟橋','山田','横山','森','猪股','佐藤','大嶽'];
function normTantou(t) {
  for (const m of MAIN_TANTOU) { if (t.includes(m)) return m; }
  return t || '未設定';
}

// データ分割
const activeData = RAW_DATA.filter(r => r.kanryo === '進行中');
const doneData = RAW_DATA.filter(r => r.kanryo === '完了');

// 集計（進行中のみ）
const tantouCount = {}, tantouOverdue = {}, tantouStatus = {};
let totalOverdue = 0, totalAction = 0;
activeData.forEach(r => {
  const t = normTantou(r.tantou);
  tantouCount[t] = (tantouCount[t]||0)+1;
  if (!tantouStatus[t]) tantouStatus[t] = {};
  tantouStatus[t][r.status] = (tantouStatus[t][r.status]||0)+1;
  if (r.okure > 0) {
    tantouOverdue[t] = (tantouOverdue[t]||0)+1;
    totalOverdue++;
    if (!r.shinchoku.includes('合格')) totalAction++;
  }
});

].map(k => `<div class="kpi-card ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div></div>`).join('');

const STATUS_KPI = [
  { label:'打ち合わせ待ち', color:'#42a5f5' },
  { label:'製作段階（作成・承認含む）', color:'#66bb6a' },
  { label:'型UP待ち', color:'#ffa726' },
  { label:'鋳造試作待ち', color:'#ef5350' },
  { label:'加工試作待ち', color:'#ab47bc' },
  { label:'寸検待ち', color:'#26c6da' },
  { label:'工事検討中', color:'#8d6e63' },
  { label:'金型工事中', color:'#78909c' },
  { label:'初品提出中', color:'#ffca28' },
  { label:'ASSＹまち', color:'#ec407a' },
  { label:'その他', color:'#bdbdbd' },
];
document.getElementById('kpiStatusRow').innerHTML = STATUS_KPI.map(s => {
  const cnt = activeData.filter(r => r.status === s.label).length;
  return `<div class="kpi-sm" style="border-top-color:${s.color}"><div class="label">${s.label}</div><div class="value">${cnt}</div></div>`;
}).join('');

// 共通: datalabels無効のデフォルト
Chart.defaults.set('plugins.datalabels', { display: false });

// ===== 担当別円グラフ =====
const sortedTantou = Object.entries(tantouCount).sort((a,b)=>b[1]-a[1]);
const pieColors = ['#42a5f5','#66bb6a','#ffa726','#ef5350','#ab47bc','#26c6da','#ec407a','#78909c','#8d6e63','#ffca28','#bdbdbd','#a1887f'];
new Chart(document.getElementById('pieChart'), {
  type: 'doughnut',
  data: {
    labels: sortedTantou.map(e=>e[0]),
    datasets: [{ data: sortedTantou.map(e=>e[1]), backgroundColor: pieColors, borderWidth: 0 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { position:'right', labels:{ color:'#ccc', font:{size:13}, padding:6 }},
      tooltip: { callbacks: { label: ctx => ctx.label+': '+ctx.raw+'件 ('+Math.round(ctx.raw/activeData.length*100)+'%)' }},
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex] >= 10,
        color: '#fff', font: { size: 13, weight: 'bold' },
        formatter: (v) => v + '件',
        textAlign: 'center'
      }
    }
  }
});

// ===== 積み上げ棒グラフ =====
const stackTantou = sortedTantou.map(e=>e[0]);
new Chart(document.getElementById('stackedChart'), {
  type: 'bar',
  data: {
    labels: stackTantou,
    datasets: STATUS_ORDER.map(s => ({
      label: s, data: stackTantou.map(t => (tantouStatus[t]||{})[s] || 0),
      backgroundColor: STATUS_COLORS[s],
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
    scales: {
      x: { stacked:true, ticks:{color:'#90a4ae'}, grid:{color:'#263544'} },
      y: { stacked:true, ticks:{color:'#ccc',font:{size:13}}, grid:{display:false} }
    },
    plugins: {
      legend: { position:'bottom', labels:{ color:'#ccc', font:{size:12}, boxWidth:12, padding:6 }},
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex] > 3,
        color: '#fff', font: { size: 11, weight: 'bold' },
        formatter: v => v
      }
    }
  }
});

// ===== 負荷チャート =====
const loadPctPlugin = {
  id: 'loadPct',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    const meta0 = chart.getDatasetMeta(0); // 期日遅れ
    const meta1 = chart.getDatasetMeta(1); // 正常進行
    ctx.save();
    ctx.font = 'bold 13px Meiryo, sans-serif';
    ctx.textAlign = 'center';
    stackTantou.forEach((t, i) => {
      const od = tantouOverdue[t] || 0;
      const total = tantouCount[t] || 0;
      if (total === 0) return;
      const pct = Math.round(od / total * 100);
      // バーの上に表示
      const bar1 = meta1.data[i];
      const bar0 = meta0.data[i];
      const topY = Math.min(bar0.y, bar1.y) - 6;
      ctx.fillStyle = pct >= 30 ? '#f44336' : pct >= 15 ? '#ff9800' : '#90a4ae';
      ctx.fillText(pct + '%', bar0.x, topY);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('loadChart'), {
  type: 'bar',
  data: {
    labels: stackTantou,
    datasets: [
      { label:'期日遅れ', data: stackTantou.map(t=>tantouOverdue[t]||0), backgroundColor:'#f4433699', borderColor:'#f44336', borderWidth:1 },
      { label:'正常進行', data: stackTantou.map(t=>(tantouCount[t]||0)-(tantouOverdue[t]||0)), backgroundColor:'#42a5f599', borderColor:'#42a5f5', borderWidth:1 },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: { top: 20 } },
    scales: {
      x: { stacked:true, ticks:{color:'#ccc',font:{size:13}}, grid:{display:false} },
      y: { stacked:true, ticks:{color:'#90a4ae'}, grid:{color:'#263544'} }
    },
    plugins: {
      legend: { labels:{ color:'#ccc', font:{size:13} }},
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex] > 2,
        color: '#fff', font: { size: 12, weight: 'bold' },
        formatter: v => v
      }
    }
  },
  plugins: [loadPctPlugin]
});

// ===== ステータス円グラフ =====
const statusTotals = STATUS_ORDER.map(s => ({ s, c: activeData.filter(r=>r.status===s).length })).filter(e=>e.c>0);
new Chart(document.getElementById('statusPie'), {
  type: 'doughnut',
  data: {
    labels: statusTotals.map(e=>e.s),
    datasets: [{ data: statusTotals.map(e=>e.c), backgroundColor: statusTotals.map(e=>STATUS_COLORS[e.s]), borderWidth: 0 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { position:'right', labels:{ color:'#ccc', font:{size:13}, padding:5 }},
      tooltip: { callbacks: { label: ctx => ctx.label+': '+ctx.raw+'件' }},
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex] >= 8,
        color: '#fff', font: { size: 12, weight: 'bold' },
        formatter: (v, ctx) => v + '件'
      }
    }
  }
});


// ===== テーブル =====
let currentTab = 'action';
let sortCol = 'okure', sortAsc = false;

const tantouSet = [...new Set(RAW_DATA.map(r=>r.tantou))].filter(Boolean).sort();
const ALL_STATUSES = [...STATUS_ORDER, ...DONE_STATUSES];
const statusSet = ALL_STATUSES.filter(s => RAW_DATA.some(r => r.status === s));
const kyakusakiSet = [...new Set(RAW_DATA.map(r=>r.kyakusaki))].filter(Boolean).sort();
tantouSet.forEach(v => { document.getElementById('filterTantou').innerHTML += `<option value="${v}">${v}</option>`; });
ALL_STATUSES.forEach(v => { document.getElementById('filterStatus').innerHTML += `<option value="${v}">${v}</option>`; });
kyakusakiSet.forEach(v => { document.getElementById('filterKyakusaki').innerHTML += `<option value="${v}">${v}</option>`; });

const COLS = [
  { key:'no', label:'No', w:'40px' },
  { key:'kanryo', label:'状態', w:'55px' },
  { key:'tantou', label:'担当', w:'55px' },
  { key:'hinban', label:'品番', w:'95px' },
  { key:'hinmei', label:'品名', w:'110px' },
  { key:'kyakusaki', label:'客先', w:'90px' },
  { key:'koushinGata', label:'更新型', w:'45px' },
  { key:'status', label:'ステータス', w:'110px' },
  { key:'kijitsu', label:'期日', w:'85px' },
  { key:'okure', label:'遅れ日数', w:'70px' },
  { key:'shinchoku', label:'進捗メモ', w:'180px' },
];

function getFilteredData() {
  let d = RAW_DATA;
  if (currentTab === 'action') d = d.filter(r => r.kanryo==='進行中' && r.okure > 0 && !r.shinchoku.includes('合格'));
  else if (currentTab === 'overdue') d = d.filter(r => r.kanryo==='進行中' && r.okure > 0);
  else if (currentTab === 'active') d = d.filter(r => r.kanryo==='進行中');
  else if (currentTab === 'done') d = d.filter(r => r.kanryo==='完了');

  const ft = document.getElementById('filterTantou').value;
  const fs = document.getElementById('filterStatus').value;
  const fk = document.getElementById('filterKyakusaki').value;
  const fkr = document.getElementById('filterKanryo').value;
  const fx = document.getElementById('filterText').value.toLowerCase();
  if (ft) d = d.filter(r => r.tantou === ft);
  if (fs) d = d.filter(r => r.status === fs);
  if (fk) d = d.filter(r => r.kyakusaki === fk);
  if (fkr) d = d.filter(r => r.kanryo === fkr);
  if (fx) d = d.filter(r => (r.hinban+r.hinmei).toLowerCase().includes(fx));

  d.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va-vb : vb-va;
    va = String(va||''); vb = String(vb||'');
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  return d;
}

function renderTable() {
  const d = getFilteredData();
  document.getElementById('resultCount').textContent = d.length + '件';
  document.getElementById('tableHead').innerHTML = COLS.map(c =>
    `<th style="width:${c.w}" onclick="doSort('${c.key}')">${c.label} ${sortCol===c.key?(sortAsc?'▲':'▼'):''}</th>`
  ).join('');

  document.getElementById('tableBody').innerHTML = d.map(r => {
    const phase = STATUS_PHASE[r.status] || 'other';
    let okureClass = '';
    let actionTag = '';
    if (r.okure > 90) okureClass = 'overdue-high';
    else if (r.okure > 30) okureClass = 'overdue-mid';
    else if (r.okure > 0) okureClass = 'overdue-low';
    if (r.okure > 90 && !r.shinchoku.includes('合格')) actionTag = '<span class="action-tag urgent">要対応</span>';
    else if (r.okure > 30 && !r.shinchoku.includes('合格')) actionTag = '<span class="action-tag watch">注意</span>';
    const kanryoCls = r.kanryo === '完了' ? 'done' : 'active';

    return `<tr>
      <td>${r.no}</td>
      <td><span class="kanryo-badge ${kanryoCls}">${r.kanryo}</span></td>
      <td>${r.tantou}</td>
      <td>${r.hinban}</td>
      <td>${r.hinmei}</td>
      <td>${r.kyakusaki}</td>
      <td>${r.koushinGata}</td>
      <td><span class="badge ${phase}">${r.status}</span></td>
      <td>${r.kijitsu}</td>
      <td class="${okureClass}">${r.okure > 0 ? r.okure+'日' : '-'}${actionTag}</td>
      <td title="${r.shinchoku}">${r.shinchoku}</td>
    </tr>`;
  }).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  sortCol = (tab === 'all' || tab === 'active' || tab === 'done') ? 'no' : 'okure';
  sortAsc = (tab === 'all' || tab === 'active' || tab === 'done');
  renderTable();
}
function doSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col === 'no' || col === 'tantou'; }
  renderTable();
}

['filterTantou','filterStatus','filterKyakusaki','filterKanryo','filterText'].forEach(id => {
  document.getElementById(id).addEventListener(id==='filterText'?'input':'change', renderTable);
});

renderTable();
</script>
