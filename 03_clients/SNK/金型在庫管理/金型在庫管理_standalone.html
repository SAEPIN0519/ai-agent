        :root { --primary: #2563eb; --success: #16a34a; --warning: #ea580c; --danger: #dc2626; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; color: white; font-weight: 600;
            z-index: 9999; animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity:0; transform: translateX(-50%) translateY(-10px); }
            10% { opacity:1; transform: translateX(-50%) translateY(0); }
            80% { opacity:1; } 100% { opacity:0; }
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-content { background: white; border-radius: 16px; padding: 24px; margin: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
        input[type="text"], select {
            font-size: 1.1rem; padding: 14px; border-radius: 10px; border: 2px solid #cbd5e1; width: 100%;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        /* ラック配置図スタイル */
        .rack-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .rack-card {
            padding: 14px 8px; border-radius: 12px; text-align: center; cursor: pointer;
            border: 3px solid transparent; transition: all 0.15s; font-weight: 700;
        }
        .rack-card:hover { transform: scale(1.03); }
        .rack-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.3); }

        .door-section { margin-bottom: 16px; }
        .door-header { font-weight: 700; font-size: 0.95rem; padding: 8px 12px; border-radius: 8px 8px 0 0; }
        .slot-grid { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 2px; }
        .slot-cell {
            padding: 8px 4px; text-align: center; font-size: 0.72rem; border: 1px solid #e2e8f0;

<script>
// ============================================================
// 更新型マスターデータ（受付No → 品番・品名・更新型No）
// ============================================================
let MOLD_MASTER = [];
let currentMoldInfo = null;
let currentInputMode = 'uketsuke'; // 'uketsuke' or 'manual'

// 入力モード切替
function switchInputMode(mode) {
    currentInputMode = mode;
    const uketsukeBtn = document.getElementById('modeUketsuke');
    const manualBtn = document.getElementById('modeManual');
    const uketsukeInput = document.getElementById('inputUketsuke');
    const manualInput = document.getElementById('inputManual');

    if (mode === 'uketsuke') {
        uketsukeBtn.className = 'flex-1 py-3 rounded-xl font-bold text-sm border-2 border-blue-600 bg-blue-600 text-white';
        manualBtn.className = 'flex-1 py-3 rounded-xl font-bold text-sm border-2 border-gray-300 bg-white text-gray-600';
        uketsukeInput.classList.remove('hidden');
        manualInput.classList.add('hidden');
        currentMoldInfo = null;
    } else {
        manualBtn.className = 'flex-1 py-3 rounded-xl font-bold text-sm border-2 border-orange-500 bg-orange-500 text-white';
        uketsukeBtn.className = 'flex-1 py-3 rounded-xl font-bold text-sm border-2 border-gray-300 bg-white text-gray-600';
        manualInput.classList.remove('hidden');
        uketsukeInput.classList.add('hidden');
        currentMoldInfo = null;
    }
}

// マスターデータ読み込み（scriptタグで mold_master.js を読み込み済み）
function loadMoldMaster() {
    if (typeof MOLD_MASTER_DATA !== 'undefined') {
        MOLD_MASTER = MOLD_MASTER_DATA;
        console.log('マスターデータ読み込み完了:', MOLD_MASTER.length, '件');
    } else {
        console.log('マスターデータが見つかりません（デモモードで動作）');
        MOLD_MASTER = [
            { no: '1', customer: '名光', hinban: '44', hinmei: 'スリーブ', koushinNo: '5 17～20', maker: 'テックアダチ' },
            { no: '2', customer: '住友理工', hinban: 'TG-719-02', hinmei: 'PALTE', koushinNo: '3', maker: 'テックアダチ' },
            { no: '3', customer: '住友理工', hinban: 'TZ-721-01', hinmei: 'BRACKET ENG MTG', koushinNo: '2', maker: 'テックアダチ' },
        ];
    }
}

// 受付Noで検索 → 情報カード表示
function lookupMold(input) {
    const val = input.trim();
    const cardEl = document.getElementById('moldInfoCard');
    const notFoundEl = document.getElementById('moldInfoNotFound');

    if (!val) {
        cardEl.classList.add('hidden');
        notFoundEl.classList.add('hidden');
        currentMoldInfo = null;
        return;
    }

    const found = MOLD_MASTER.find(m => m.no === val);
    if (found) {
        document.getElementById('moldInfoHinban').textContent = found.hinban || '—';
        document.getElementById('moldInfoHinmei').textContent = found.hinmei || '—';
        document.getElementById('moldInfoKoushin').textContent = found.koushinNo || '—';
        document.getElementById('moldInfoCustomer').textContent = found.customer || '—';
        cardEl.classList.remove('hidden');
        notFoundEl.classList.add('hidden');
        currentMoldInfo = found;
    } else {
        cardEl.classList.add('hidden');
        notFoundEl.classList.remove('hidden');
        currentMoldInfo = null;
    }
}

// ============================================================
// 実際のラック構造定義
// ============================================================
const RACK_DEFS = {
    '旧Dラック': {
        color: '#2563eb', colorLight: '#dbeafe',
        doors: [
            { name: '⑤番扉', positions: ['左','中央','右'] },
            { name: '④番扉', positions: ['左','中央','右'] },
            { name: '③番扉', positions: ['左','中央','右'] },
            { name: '②番扉', positions: ['左','中央','右'] },
            { name: '①番扉', positions: ['左','中央','右'] },
        ],
        levels: ['3段目','2段目','1段目奥','1段目手前'],
    },
    '新Dラック': {
        color: '#3b82f6', colorLight: '#dbeafe',
        doors: [
            { name: '③番扉', positions: ['左','中央','右'] },
            { name: '②番扉', positions: ['左','中央','右'] },
            { name: '①番扉', positions: ['左','中央','右'] },
        ],
        levels: ['3段目','2段目','1段目奥','1段目手前'],
    },
    'F北側ラック': {
        color: '#16a34a', colorLight: '#dcfce7',
        doors: [
            { name: '⑦番扉', positions: ['左','中央','右'] },
            { name: '⑥番扉', positions: ['左','中央','右'] },
            { name: '⑤番扉', positions: ['左','中央','右'] },
        ],
        levels: ['3段目','2段目','1段目奥','1段目手前'],
    },
    'F南側ラック': {
        color: '#22c55e', colorLight: '#dcfce7',
        doors: [
            { name: '③番扉', positions: ['左','中央','右'] },
            { name: '②番扉', positions: ['左','中央','右'] },
            { name: '①番扉', positions: ['左','中央','右'] },
        ],
        levels: ['3段目','2段目','1段目奥','1段目手前'],
    },
    'G北側ラック': {
        color: '#ea580c', colorLight: '#ffedd5',
        doors: [
            { name: '④番扉', positions: ['左','中央','右'] },
            { name: '③番扉', positions: ['左','中央','右'] },
            { name: '②番扉', positions: ['左','中央','右'] },
        ],
        levels: ['2段目','1段目奥','1段目手前'],
    },
};

// ============================================================
// データ管理（LocalStorage）
// ============================================================
function getInventory() {
    const stored = localStorage.getItem('moldInventory');
    if (!stored && typeof INITIAL_INVENTORY !== 'undefined') {
        // 初回起動時: 初期データをセット
        localStorage.setItem('moldInventory', JSON.stringify(INITIAL_INVENTORY));
        console.log('初期在庫データをセットしました:', Object.keys(INITIAL_INVENTORY).length, '件');
        return INITIAL_INVENTORY;
    }
    return JSON.parse(stored || '{}');
}
function saveInventory(inv) {
    localStorage.setItem('moldInventory', JSON.stringify(inv));
}

// スロットキー: "旧Dラック/⑤番扉/左/3段目"
function slotKey(rack, door, pos, level) {
    return `${rack}/${door}/${pos}/${level}`;
}

function getSlot(rack, door, pos, level) {
    const inv = getInventory();
    return inv[slotKey(rack, door, pos, level)] || null;
}

function setSlot(rack, door, pos, level, moldNo, moldInfo = null) {
    const inv = getInventory();
    const key = slotKey(rack, door, pos, level);
    if (moldNo) {
        inv[key] = {
            moldNo,
            hinban: moldInfo?.hinban || '',
            hinmei: moldInfo?.hinmei || '',
            koushinNo: moldInfo?.koushinNo || '',
            customer: moldInfo?.customer || '',
            updatedAt: new Date().toISOString()
        };
    } else {
        delete inv[key];
    }
    saveInventory(inv);
}

// 2個目を追加
function setSlotItem2(rack, door, pos, level, moldNo, moldInfo = null) {
    const inv = getInventory();
    const key = slotKey(rack, door, pos, level);
    if (!inv[key]) return;
    inv[key].split = true;
    inv[key].item2 = {
        moldNo,
        hinban: moldInfo?.hinban || '',
        hinmei: moldInfo?.hinmei || '',
        koushinNo: moldInfo?.koushinNo || '',
        customer: moldInfo?.customer || '',
    };
    inv[key].updatedAt = new Date().toISOString();
    saveInventory(inv);
}

// 分割モードに切替（2個目はまだ空き）
function splitSlot(rack, door, pos, level) {
    const inv = getInventory();
    const key = slotKey(rack, door, pos, level);
    if (!inv[key]) return;
    inv[key].split = true;
    if (!inv[key].item2) inv[key].item2 = null;
    saveInventory(inv);
}

// 分割解除（1個に戻す）
function unsplitSlot(rack, door, pos, level) {
    const inv = getInventory();
    const key = slotKey(rack, door, pos, level);
    if (!inv[key]) return;
    delete inv[key].split;
    delete inv[key].item2;
    saveInventory(inv);
}

// 2個目を出庫
function clearSlotItem2(rack, door, pos, level) {
    const inv = getInventory();
    const key = slotKey(rack, door, pos, level);
    if (!inv[key]) return;
    inv[key].item2 = null;
    inv[key].updatedAt = new Date().toISOString();
    saveInventory(inv);
}

// 金型Noで検索（どのスロットにあるか）
function findMold(moldNo) {
    const inv = getInventory();
    const upper = moldNo.toUpperCase();
    for (const [key, val] of Object.entries(inv)) {
        if (val.moldNo?.toUpperCase() === upper) {
            const [rack, door, pos, level] = key.split('/');
            return { rack, door, pos, level, slot: 1, ...val };
        }
        // 2個目も検索
        if (val.item2?.moldNo?.toUpperCase() === upper) {
            const [rack, door, pos, level] = key.split('/');
            return { rack, door, pos, level, slot: 2, ...val.item2 };
        }
    }
    return null;
}

// ============================================================
// ラック選択カード生成
// ============================================================
function renderRackSelector(containerId, onSelect) {
    const container = document.getElementById(containerId);
    container.innerHTML = Object.entries(RACK_DEFS).map(([name, def]) => `
        <div class="rack-card" style="background: ${def.colorLight}; color: ${def.color}"
             data-rack="${name}" onclick="(${onSelect.toString()})('${name}', this)">
            <div class="text-lg">${name}</div>
            <div class="text-xs opacity-70">${def.doors.length}扉</div>
        </div>
    `).join('');
}

function selectRackCard(el, containerId) {
    document.querySelectorAll(`#${containerId} .rack-card`).forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
}

// ============================================================
// 配置図（ラックマップ）レンダリング
// ============================================================
function formatSlotContent(slot) {
    const parts = [];
    // 受付番号（手動登録のM-xxx以外）
    const no = slot.moldNo && !slot.moldNo.startsWith('M-') ? `(${slot.moldNo})` : '';
    if (slot.hinban) parts.push(`<b>${no}${slot.hinban}</b>`);
    else if (no) parts.push(`<b>${no}</b>`);
    if (slot.hinmei) parts.push(`<span style="font-size:0.65rem">${slot.hinmei}</span>`);
    if (slot.koushinNo) parts.push(`<span style="font-size:0.6rem;color:#2563eb">${slot.koushinNo}</span>`);
    return parts.length > 0 ? parts.join('<br>') : (slot.moldNo || '');
}

function renderRackMap(containerId, rackName, options = {}) {
    const def = RACK_DEFS[rackName];
    if (!def) return;
    const container = document.getElementById(containerId);
    const { onSlotClick, mode } = options; // mode: 'receive', 'move', 'inventory'

    let html = '';
    for (const door of def.doors) {
        html += `<div class="door-section">`;
        html += `<div class="door-header" style="background: ${def.color}; color: white">${door.name}</div>`;
        html += `<div class="slot-grid">`;

        // ヘッダー行: 空 + 位置名
        html += `<div class="slot-cell pos-header" style="background: ${def.color}">段</div>`;
        for (const pos of door.positions) {
            html += `<div class="slot-cell pos-header" style="background: ${def.color}">${pos}</div>`;
        }

        // 各段
        for (const level of def.levels) {
            html += `<div class="slot-cell level-label">${level}</div>`;
            for (const pos of door.positions) {
                const slot = getSlot(rackName, door.name, pos, level);
                const isEmpty = !slot;
                const dataAttrs = `data-rack="${rackName}" data-door="${door.name}" data-pos="${pos}" data-level="${level}"`;

                if (isEmpty) {
                    // 空きスロット
                    const canClick = mode === 'receive' || mode === 'move' || mode === 'inventory';
                    const onclick = canClick ? `onclick="handleSlotClick(this, '${mode}')"` : '';
                    html += `<div class="slot-cell empty" ${dataAttrs} ${onclick}>空き</div>`;
                } else if (slot.split) {
                    // 分割スロット（1セル内に上下2段）
                    const item1Html = formatSlotContent(slot);
                    const hasItem2 = slot.item2 && slot.item2.moldNo;
                    const item2Html = hasItem2 ? formatSlotContent(slot.item2) : '▼ 空き（タップ）';
                    const item2Bg = hasItem2 ? '#fee2e2' : '#dcfce7';
                    const item2Color = hasItem2 ? '#991b1b' : '#16a34a';
                    const clickAttr = (!hasItem2 && (mode === 'receive' || mode === 'move'))
                        ? 'split-click="true"' : '';
                    html += `<div class="slot-cell" style="padding:0;border:1px solid #e2e8f0;cursor:pointer;display:flex;flex-direction:column;" ${dataAttrs} data-split="true" onclick="showSlotMenu(this)">
                        <div style="flex:1;padding:4px 2px;border-bottom:2px dashed #f97316;display:flex;align-items:center;justify-content:center;background:#fee2e2;color:#991b1b;text-align:center;">${item1Html}</div>
                        <div style="flex:1;padding:4px 2px;display:flex;align-items:center;justify-content:center;background:${item2Bg};color:${item2Color};cursor:${hasItem2 ? 'default' : 'pointer'};text-align:center;font-weight:${hasItem2 ? 'normal' : 'bold'};"
                             ${clickAttr} data-rack2="${rackName}" data-door2="${door.name}" data-pos2="${pos}" data-level2="${level}">${item2Html}</div>
                    </div>`;
                } else {
                    // 通常の使用中スロット（タップで操作メニュー表示）
                    const content = formatSlotContent(slot);
                    const menuClick = (mode === 'receive') ? `onclick="showSlotMenu(this)"` : '';
                    html += `<div class="slot-cell occupied" ${dataAttrs} style="cursor:${mode === 'receive' ? 'pointer' : 'default'}" ${menuClick}>${content}</div>`;
                }
            }
        }
        html += `</div></div>`;
    }
    container.innerHTML = html;

    // 分割セルの2個目クリックをイベントデリゲーションで処理
    container.addEventListener('click', function(e) {
        const target = e.target.closest('[split-click="true"]');
        if (target) {
            const rack = target.getAttribute('data-rack2');
            const door = target.getAttribute('data-door2');
            const pos = target.getAttribute('data-pos2');
            const level = target.getAttribute('data-level2');
            if (rack && door && pos && level) {
                handleSlotClick(target, mode, 2);
            }
        }
    });
}

// 入庫 — スロットタップ処理
// ============================================================
let selectedReceiveSlot = null;
let selectedMoveSlot = null;
let pendingSlotClick = null; // 個数選択待ちの情報

function handleSlotClick(el, mode, slotNum) {
    // 2個目スロット（分割済みの空き側）への入庫
    if (Number(slotNum) === 2) {
        const rack = el.getAttribute('data-rack2') || el.dataset.rack;
        const door = el.getAttribute('data-door2') || el.dataset.door;
        const pos = el.getAttribute('data-pos2') || el.dataset.pos;
        const level = el.getAttribute('data-level2') || el.dataset.level;
        if (mode === 'receive') {
            selectedReceiveSlot = { rack, door, pos, level, slotNum: 2 };
            const label = `${rack} ＞ ${door} ＞ ${pos} ＞ ${level}（2個目）`;
            document.getElementById('receiveSelectionText').textContent = label;
            document.getElementById('receiveSelection').classList.remove('hidden');
            showToast('2個目の置場を選択したよ。入庫情報を入力して登録してね', 'success');
        }
        return;
    }

    if (mode === 'receive') {
        // 空きスロットタップ → 個数選択モーダル表示
        pendingSlotClick = {
            el,
            rack: el.dataset.rack,
            door: el.dataset.door,
            pos: el.dataset.pos,
            level: el.dataset.level,
        };
        const slotName = `${pendingSlotClick.rack} ＞ ${pendingSlotClick.door} ＞ ${pendingSlotClick.pos} ＞ ${pendingSlotClick.level}`;
        document.getElementById('countModalSlotName').textContent = slotName;
        document.getElementById('countModal').classList.remove('hidden');
    } else if (mode === 'move') {
        document.querySelectorAll('#moveMapContent .slot-cell.selected').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedMoveSlot = {
            rack: el.dataset.rack,
            door: el.dataset.door,
            pos: el.dataset.pos,
            level: el.dataset.level,
        };
        const label = `${selectedMoveSlot.rack} ＞ ${selectedMoveSlot.door} ＞ ${selectedMoveSlot.pos} ＞ ${selectedMoveSlot.level}`;
        document.getElementById('moveSelectionText').textContent = label;
        document.getElementById('moveSelection').classList.remove('hidden');
    } else if (mode === 'inventory') {
        handleInventorySlotClick(el);
    }
}

// 入庫ラック選択
// 個数選択モーダル
// ============================================================
// 使用中セルのメニュー（2分割 / 出庫）
// ============================================================
let slotMenuTarget = null;

function showSlotMenu(el) {
    const rack = el.dataset.rack || el.getAttribute('data-rack');
    const door = el.dataset.door || el.getAttribute('data-door');
    const pos = el.dataset.pos || el.getAttribute('data-pos');
    const level = el.dataset.level || el.getAttribute('data-level');
    const slot = getSlot(rack, door, pos, level);
    if (!slot) return;

    slotMenuTarget = { rack, door, pos, level, slot };
    document.getElementById('slotMenuName').textContent = `${rack} ＞ ${door} ＞ ${pos} ＞ ${level}`;

    // 分割セルかどうかでメニュー内容を変える
    const btnArea = document.getElementById('slotMenuButtons');
    if (slot.split) {
        const item1Text = slot.hinban ? `${slot.hinban} ${slot.hinmei || ''}` : slot.moldNo;
        const item2 = slot.item2;
        const hasItem2 = item2 && item2.moldNo;
        const item2Text = hasItem2 ? (item2.hinban ? `${item2.hinban} ${item2.hinmei || ''}` : item2.moldNo) : '（空き）';
        document.getElementById('slotMenuMold').innerHTML =
            `<span style="font-size:0.85rem">1個目: ${item1Text}<br>2個目: ${item2Text}</span>`;
        let btns = '';
        if (!hasItem2) {
            // 2個目が空き → 入庫ボタンを表示
            btns += `<button onclick="slotMenuAction('add2')" class="btn-large w-full bg-green-600 text-white">2個目を入庫する</button>`;
        }
        btns += `<button onclick="slotMenuAction('remove1')" class="btn-large w-full bg-red-500 text-white">1個目を出庫（${item1Text}）</button>`;
        if (hasItem2) {
            btns += `<button onclick="slotMenuAction('remove2')" class="btn-large w-full bg-red-400 text-white">2個目を出庫（${item2Text}）</button>`;
            btns += `<button onclick="slotMenuAction('removeAll')" class="btn-large w-full bg-red-700 text-white">両方出庫</button>`;
        }
        btns += `<button onclick="closeSlotMenu()" class="btn-large w-full bg-gray-200 text-gray-600">キャンセル</button>`;
        btnArea.innerHTML = btns;
    } else {
        const moldText = slot.hinban ? `${slot.hinban} ${slot.hinmei || ''}` : slot.moldNo;
        document.getElementById('slotMenuMold').textContent = moldText;
        btnArea.innerHTML = `
            <button onclick="slotMenuAction('split')" class="btn-large w-full bg-orange-500 text-white">2分割にする（もう1個追加）</button>
            <button onclick="slotMenuAction('remove')" class="btn-large w-full bg-red-500 text-white">出庫する（取り出す）</button>
            <button onclick="closeSlotMenu()" class="btn-large w-full bg-gray-200 text-gray-600">キャンセル</button>
        `;
    }
    document.getElementById('slotMenuModal').classList.remove('hidden');
}

function closeSlotMenu() {
    document.getElementById('slotMenuModal').classList.add('hidden');
    slotMenuTarget = null;
}

function slotMenuAction(action) {
    if (!slotMenuTarget) return;
    const { rack, door, pos, level, slot } = slotMenuTarget;
    closeSlotMenu();

    if (action === 'add2') {
        // 分割セルの2個目に入庫 → 2個目待ちへ
        selectedReceiveSlot = { rack, door, pos, level, slotNum: 2 };
        const label = `${rack} ＞ ${door} ＞ ${pos} ＞ ${level}（2個目）`;
        document.getElementById('receiveSelectionText').innerHTML =
            `<span style="animation:pulse 1s infinite">📦 2個目を入力してね</span><br>${label}`;
        const selEl = document.getElementById('receiveSelection');
        selEl.classList.remove('hidden');
        selEl.style.background = '#fef3c7';
        selEl.style.borderColor = '#f59e0b';

        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => {
            if (currentInputMode === 'uketsuke') {
                document.getElementById('receiveUketsuke').focus();
            } else {
                document.getElementById('manualHinmei').focus();
            }
        }, 300);

        showToast('2個目を入力してね', 'success');
        return;
    } else if (action === 'split') {
        // 2分割にする → 即座に分割して2個目待ちへ
        splitSlot(rack, door, pos, level);
        renderRackMap('rackMapContent', rack, { mode: 'receive' });

        // 2個目待ち状態にする
        selectedReceiveSlot = { rack, door, pos, level, slotNum: 2 };
        const label = `${rack} ＞ ${door} ＞ ${pos} ＞ ${level}（2個目）`;
        document.getElementById('receiveSelectionText').innerHTML =
            `<span style="animation:pulse 1s infinite">📦 2個目を入力してね</span><br>${label}`;
        const selEl = document.getElementById('receiveSelection');
        selEl.classList.remove('hidden');
        selEl.style.background = '#fef3c7';
        selEl.style.borderColor = '#f59e0b';

        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => {
            if (currentInputMode === 'uketsuke') {
                document.getElementById('receiveUketsuke').focus();
            } else {
                document.getElementById('manualHinmei').focus();
            }
        }, 300);

        showToast('2分割にしたよ。2個目を入力してね', 'success');
    } else if (action === 'remove') {
        // 通常スロットの出庫
        const moldLabel = slot.hinban ? `${slot.hinban} ${slot.hinmei || ''}` : slot.moldNo;
        setSlot(rack, door, pos, level, null);
        addHistory('ship', `${moldLabel} ← ${rack} ${door} ${pos} ${level}`);
        renderRackMap('rackMapContent', rack, { mode: 'receive' });
        showToast(`出庫完了: ${moldLabel}`, 'success');
    } else if (action === 'remove1') {
        // 分割スロットの1個目だけ出庫
        const moldLabel = slot.hinban ? `${slot.hinban} ${slot.hinmei || ''}` : slot.moldNo;
        const inv = getInventory();
        const key = slotKey(rack, door, pos, level);
        if (slot.item2 && slot.item2.moldNo) {
            // 2個目を1個目に繰り上げて、分割解除
            const item2 = slot.item2;
            inv[key] = {
                moldNo: item2.moldNo,
                hinban: item2.hinban || '',
                hinmei: item2.hinmei || '',
                koushinNo: item2.koushinNo || '',
                customer: item2.customer || '',
                updatedAt: new Date().toISOString()
            };
        } else {
            // 2個目が空なら、スロット自体を削除
            delete inv[key];
        }
        saveInventory(inv);
        addHistory('ship', `${moldLabel} ← ${rack} ${door} ${pos} ${level}（1個目出庫）`);
        renderRackMap('rackMapContent', rack, { mode: 'receive' });
        showToast(`出庫完了: ${moldLabel}`, 'success');
    } else if (action === 'remove2') {
        // 分割スロットの2個目だけ出庫 → 分割解除して1個に戻す
        const item2 = slot.item2;
        const moldLabel = item2.hinban ? `${item2.hinban} ${item2.hinmei || ''}` : item2.moldNo;
        const inv = getInventory();
        const key = slotKey(rack, door, pos, level);
        // 1個目はそのまま残して、split と item2 だけ消す
        delete inv[key].split;
        delete inv[key].item2;
        inv[key].updatedAt = new Date().toISOString();
        saveInventory(inv);
        addHistory('ship', `${moldLabel} ← ${rack} ${door} ${pos} ${level}（2個目出庫）`);
        renderRackMap('rackMapContent', rack, { mode: 'receive' });
        showToast(`出庫完了: ${moldLabel}`, 'success');
    } else if (action === 'removeAll') {
        // 両方出庫
        const moldLabel = slot.hinban ? `${slot.hinban}` : slot.moldNo;
        const item2Label = slot.item2 ? (slot.item2.hinban || slot.item2.moldNo) : '';
        setSlot(rack, door, pos, level, null);
        addHistory('ship', `${moldLabel} + ${item2Label} ← ${rack} ${door} ${pos} ${level}（両方出庫）`);
        renderRackMap('rackMapContent', rack, { mode: 'receive' });
        showToast(`両方出庫完了`, 'success');
    }
}

// 入庫実行
function handleReceive() {
    if (!selectedReceiveSlot) return showToast('配置図から空きスロットをタップしてね', 'error');

    const { rack, door, pos, level } = selectedReceiveSlot;
    let moldId, moldInfo, moldLabel;

    if (currentInputMode === 'uketsuke') {
        // 受付Noモード
        const uketsuke = document.getElementById('receiveUketsuke').value.trim();
        if (!uketsuke) return showToast('受付Noを入力してね', 'error');
        if (!currentMoldInfo) return showToast('有効な受付Noを入力してね', 'error');

        moldId = uketsuke;
        moldInfo = currentMoldInfo;
        moldLabel = `No.${uketsuke} ${moldInfo.hinban} ${moldInfo.koushinNo}`;

        // 既に同じ受付Noが別の場所にないか
        const existing = findMold(uketsuke);
        if (existing) {
            return showToast(`受付No.${uketsuke} は既に ${existing.rack} ${existing.door} ${existing.pos} ${existing.level} にあるよ`, 'error');
        }
    } else {
        // 手動入力モード
        const hinmei = document.getElementById('manualHinmei').value.trim();
        if (!hinmei) return showToast('品名を入力してね', 'error');

        const hinban = document.getElementById('manualHinban').value.trim();
        const bikou = document.getElementById('manualBikou').value.trim();

        // 手動入力用のIDを生成（タイムスタンプベース）
        moldId = 'M-' + Date.now();
        moldInfo = {
            hinban: hinban,
            hinmei: hinmei,
            koushinNo: bikou,
            customer: '手動登録',
        };
        moldLabel = hinmei + (hinban ? ` (${hinban})` : '');
    }

    const isItem2 = selectedReceiveSlot.slotNum === 2;
    const isSplitMode = selectedReceiveSlot.splitMode;

    if (isItem2) {
        // 分割スロットの2個目を入庫
        setSlotItem2(rack, door, pos, level, moldId, moldInfo);
        addHistory('receive', `${moldLabel} → ${rack} ${door} ${pos} ${level}（2個目）`);
        showToast(`入庫完了（2個目）: ${moldLabel}`, 'success');
    } else if (isSplitMode) {
        // 2個置きの1個目 → 分割して入庫、そのまま2個目待ちへ
        setSlot(rack, door, pos, level, moldId, moldInfo);
        splitSlot(rack, door, pos, level);
        addHistory('receive', `${moldLabel} → ${rack} ${door} ${pos} ${level}（2個置き: 1個目）`);
        // 入力欄をリセットして2個目待ち状態にする
        if (currentInputMode === 'uketsuke') {
            document.getElementById('receiveUketsuke').value = '';
            document.getElementById('moldInfoCard').classList.add('hidden');
        } else {
            document.getElementById('manualHinmei').value = '';
            document.getElementById('manualHinban').value = '';
            document.getElementById('manualBikou').value = '';
        }
        currentMoldInfo = null;

        // 2個目として自動選択（再タップ不要）
        selectedReceiveSlot = { rack, door, pos, level, slotNum: 2 };
        const label2 = `${rack} ＞ ${door} ＞ ${pos} ＞ ${level}（2個目）`;
        document.getElementById('receiveSelectionText').innerHTML =
            `<span style="animation:pulse 1s infinite">📦 2個目を入力してね</span><br>${label2}`;
        document.getElementById('receiveSelection').classList.remove('hidden');
        document.getElementById('receiveSelection').style.background = '#fef3c7';
        document.getElementById('receiveSelection').style.borderColor = '#f59e0b';

        renderRackMap('rackMapContent', rack, { mode: 'receive' });

        // 入力欄にスクロール＆フォーカス
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => {
            if (currentInputMode === 'uketsuke') {
                document.getElementById('receiveUketsuke').focus();
            } else {
                document.getElementById('manualHinmei').focus();
            }
        }, 300);

        showToast(`1個目入庫完了！ 上の入力欄に2個目を入力してね`, 'success');
        return; // ここでリターン（リセットしない）
    } else {
        // 通常の1個入庫
        setSlot(rack, door, pos, level, moldId, moldInfo);
        addHistory('receive', `${moldLabel} → ${rack} ${door} ${pos} ${level}`);
        showToast(`入庫完了: ${moldLabel}`, 'success');
    }

    // リセット
    if (currentInputMode === 'uketsuke') {
        document.getElementById('receiveUketsuke').value = '';
        document.getElementById('moldInfoCard').classList.add('hidden');
    } else {
        document.getElementById('manualHinmei').value = '';
        document.getElementById('manualHinban').value = '';
        document.getElementById('manualBikou').value = '';
    }
    currentMoldInfo = null;
    selectedReceiveSlot = null;
    const selEl = document.getElementById('receiveSelection');
    selEl.classList.add('hidden');
    selEl.style.background = '';
    selEl.style.borderColor = '';
    renderRackMap('rackMapContent', rack, { mode: 'receive' });
}

let currentSearchResult = null;

function handleSearch() {
    const moldNo = document.getElementById('searchMoldNo').value.trim().toUpperCase();
    if (!moldNo) return showToast('金型Noを入力してね', 'error');

    const found = findMold(moldNo);
    const resultDiv = document.getElementById('searchResult');
    const contentDiv = document.getElementById('searchResultContent');

    if (found) {
        currentSearchResult = found;
        const location = `${found.rack} ＞ ${found.door} ＞ ${found.pos} ＞ ${found.level}`;
        contentDiv.innerHTML = `
            <div class="bg-blue-50 rounded-xl p-4">
                <p class="text-2xl font-bold text-blue-800 mb-2">受付No. ${found.moldNo}</p>
                ${found.hinban ? `<p class="text-lg"><span class="text-gray-500">品番:</span> <strong>${found.hinban}</strong></p>` : ''}
                ${found.hinmei ? `<p class="text-sm text-gray-600">${found.hinmei} ${found.koushinNo ? '/ ' + found.koushinNo : ''}</p>` : ''}
                <p class="text-lg mt-2">保管場所:</p>
                <p class="font-bold text-green-700 text-lg">${location}</p>
                ${found.updatedAt ? `<p class="text-xs text-gray-400 mt-2">最終更新: ${new Date(found.updatedAt).toLocaleString('ja-JP')}</p>` : ''}
            </div>
        `;
        resultDiv.classList.remove('hidden');
    } else {
        currentSearchResult = null;
        contentDiv.innerHTML = `
            <div class="bg-gray-50 rounded-xl p-4">
                <p class="text-lg text-gray-500">「${moldNo}」は見つかりませんでした</p>
            </div>
        `;
        resultDiv.classList.remove('hidden');
    }
}

function handleShipOut() {
    if (!currentSearchResult) return;
    const { rack, door, pos, level, moldNo, slot: slotNum } = currentSearchResult;
    const existingSlot = getSlot(rack, door, pos, level);

    if (existingSlot && existingSlot.split) {
        // 分割セルの場合: 該当する方だけ出庫
        const inv = getInventory();
        const key = slotKey(rack, door, pos, level);
        if (slotNum === 2) {
            // 2個目を出庫 → 分割解除
            delete inv[key].split;
            delete inv[key].item2;
            inv[key].updatedAt = new Date().toISOString();
        } else {
            // 1個目を出庫
            if (existingSlot.item2 && existingSlot.item2.moldNo) {
                // 2個目を繰り上げ
                const item2 = existingSlot.item2;
                inv[key] = {
                    moldNo: item2.moldNo,
                    hinban: item2.hinban || '',
                    hinmei: item2.hinmei || '',
                    koushinNo: item2.koushinNo || '',
                    customer: item2.customer || '',
                    updatedAt: new Date().toISOString()
                };
            } else {
                delete inv[key];
            }
        }
        saveInventory(inv);
    } else {
        // 通常スロット: 全消し
        setSlot(rack, door, pos, level, null);
    }

    addHistory('ship', `${moldNo} ← ${rack} ${door} ${pos} ${level}`);
    showToast(`出庫完了: ${moldNo}`, 'success');
    document.getElementById('searchResult').classList.add('hidden');
    document.getElementById('searchMoldNo').value = '';
    currentSearchResult = null;
}

    const { rack: oldR, door: oldD, pos: oldP, level: oldL, moldNo } = currentSearchResult;

    currentSearchResult = null;
}

let capacityChart = null;

function refreshDashboard() {
    const inv = getInventory();
    const stats = {};

    for (const [rackName, def] of Object.entries(RACK_DEFS)) {
        let total = 0;
        let occupied = 0;
        for (const door of def.doors) {
            for (const pos of door.positions) {
                for (const level of def.levels) {
                    total++;
                    if (inv[slotKey(rackName, door.name, pos, level)]) occupied++;
                }
            }
        }
        stats[rackName] = { total, occupied, rate: Math.round((occupied / total) * 100), color: def.color };
    }

    // タイル
    const tilesEl = document.getElementById('rackTiles');
    tilesEl.innerHTML = Object.entries(stats).map(([name, data]) => {
        let bg = '#dcfce7'; let fg = '#166534';
        if (data.rate >= 80) { bg = '#fee2e2'; fg = '#991b1b'; }
        else if (data.rate >= 50) { bg = '#fef3c7'; fg = '#92400e'; }
        return `
            <div class="rounded-xl p-4 text-center" style="background: ${bg}; color: ${fg}">
                <p class="text-lg font-bold">${name}</p>
                <p class="text-3xl font-black">${data.rate}%</p>
                <p class="text-xs mt-1">${data.occupied} / ${data.total}</p>
            </div>
        `;
    }).join('');

    // グラフ
    const ctx = document.getElementById('capacityChart');
    const labels = Object.keys(stats);
    if (capacityChart) capacityChart.destroy();
    capacityChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [
                { label: '使用中', data: labels.map(r => stats[r].occupied), backgroundColor: '#ef4444', borderRadius: 6 },
                { label: '空き', data: labels.map(r => stats[r].total - stats[r].occupied), backgroundColor: '#22c55e', borderRadius: 6 },
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
        }
    });
}

// ============================================================
// 棚卸モード
// ============================================================
let inventoryRack = null;
let inventoryCheckState = {};

function onInventoryRackSelect(rackName, el) {
    selectRackCard(el, 'inventoryRackSelector');
    inventoryRack = rackName;
    inventoryCheckState = {};
    document.getElementById('inventoryMapArea').classList.remove('hidden');

    const def = RACK_DEFS[rackName];
    // チェック状態を初期化
    for (const door of def.doors) {
        for (const pos of door.positions) {
            for (const level of def.levels) {
                const key = slotKey(rackName, door.name, pos, level);
                const slot = getSlot(rackName, door.name, pos, level);
                inventoryCheckState[key] = { expected: slot?.moldNo || '', checked: false, result: '' };
            }
        }
    }

    renderInventoryMap();
    renderInventoryList();
}

function renderInventoryMap() {
    renderRackMap('inventoryMapContent', inventoryRack, { mode: 'inventory' });
}

function renderInventoryList() {
    const container = document.getElementById('inventoryList');
    let html = '';
    for (const [key, state] of Object.entries(inventoryCheckState)) {
        const [, door, pos, level] = key.split('/');
        const statusClass = !state.checked ? 'bg-gray-50' : state.result === 'ok' ? 'bg-green-50 border-l-4 border-green-500' : 'bg-red-50 border-l-4 border-red-500';
        const statusText = !state.checked ? '未確認' : state.result === 'ok' ? 'OK' : 'NG';
        const statusColor = !state.checked ? 'text-gray-400' : state.result === 'ok' ? 'text-green-600' : 'text-red-600';

        html += `
            <div class="rounded-xl shadow p-3 flex items-center justify-between ${statusClass}">
                <div>
                    <p class="font-bold text-sm">${door} ${pos} ${level}</p>
                    <p class="text-xs text-gray-500">${state.expected || '（空き）'}</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-bold ${statusColor}">${statusText}</span>
                    <button onclick="markInventory('${key}','ok')" class="bg-green-100 text-green-700 px-2 py-1 rounded-lg text-xs font-bold">OK</button>
                    <button onclick="markInventory('${key}','ng')" class="bg-red-100 text-red-700 px-2 py-1 rounded-lg text-xs font-bold">NG</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function handleInventorySlotClick(el) {
    const key = slotKey(el.dataset.rack, el.dataset.door, el.dataset.pos, el.dataset.level);
    if (inventoryCheckState[key]) {
        markInventory(key, 'ok');
    }
}

function markInventory(key, result) {
    if (!inventoryCheckState[key]) return;
    inventoryCheckState[key].checked = true;
    inventoryCheckState[key].result = result;
    renderInventoryList();

    // 全件チェック済みか
    if (Object.values(inventoryCheckState).every(s => s.checked)) {
        showInventoryResult();
    }
}

function handleInventoryCheck(moldNo) {
    if (!inventoryRack) return showToast('棚卸対象のラックを選択してね', 'error');
    for (const [key, state] of Object.entries(inventoryCheckState)) {
        if (state.expected?.toUpperCase() === moldNo?.toUpperCase()) {
            markInventory(key, 'ok');
            showToast(`${moldNo} 確認OK`, 'success');
            return;
        }
    }
    showToast(`${moldNo} はこのラックに登録されていないよ`, 'warning');
}

function showInventoryResult() {
    const okCount = Object.values(inventoryCheckState).filter(s => s.result === 'ok').length;
    const ngCount = Object.values(inventoryCheckState).filter(s => s.result === 'ng').length;
    const total = Object.keys(inventoryCheckState).length;
    let ngList = '';
    for (const [key, state] of Object.entries(inventoryCheckState)) {
        if (state.result === 'ng') {
            const [, door, pos, level] = key.split('/');
            ngList += `<li class="text-red-600">${door} ${pos} ${level}: ${state.expected || '（空き）'}</li>`;
        }
    }
    document.getElementById('inventoryResultContent').innerHTML = `
        <div class="text-center mb-3">
            <p class="text-3xl font-black ${ngCount === 0 ? 'text-green-600' : 'text-red-600'}">
                ${ngCount === 0 ? '全件一致' : `${ngCount}件 不一致`}
            </p>
            <p class="text-sm text-gray-500">OK: ${okCount} / NG: ${ngCount} / 合計: ${total}</p>
        </div>
        ${ngList ? `<ul class="list-disc ml-5 space-y-1">${ngList}</ul>` : ''}
    `;
    document.getElementById('inventoryResult').classList.remove('hidden');
}

// ============================================================
// QRコードスキャン
// ============================================================
let activeScanner = null;

function startQRScan(context) {
    const readerId = `qr-reader-${context}`;
    const readerEl = document.getElementById(readerId);
    readerEl.classList.remove('hidden');
    if (activeScanner) { activeScanner.stop().catch(() => {}); activeScanner = null; }
    activeScanner = new Html5Qrcode(readerId);
    activeScanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (text) => {
            activeScanner.stop().then(() => { readerEl.classList.add('hidden'); activeScanner = null; handleQRResult(context, text); });
        },
        () => {}
    ).catch(() => { readerEl.classList.add('hidden'); showToast('カメラを起動できませんでした', 'error'); });
}

function handleQRResult(context, text) {
    let moldNo = text.startsWith('MOLD:') ? text.replace('MOLD:', '').trim() : text.trim();
    if (context === 'receive') {
        document.getElementById('receiveUketsuke').value = moldNo;
        lookupMold(moldNo);
        showToast('QR読み取り完了', 'success');
    } else if (context === 'ship') {
        document.getElementById('searchMoldNo').value = moldNo;
        handleSearch();
    } else if (context === 'inventory') {
        handleInventoryCheck(moldNo);
    }
}

// ============================================================
// タブ切替
// ============================================================
function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.remove('active');
        if (['receive','ship','dashboard','inventory'][i] === name) btn.classList.add('active');
    });
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-${name}`).classList.remove('hidden');
    if (name === 'dashboard') refreshDashboard();
    if (activeScanner) { activeScanner.stop().catch(() => {}); activeScanner = null; document.querySelectorAll('.scan-area').forEach(el => el.classList.add('hidden')); }
}

// ============================================================
// 履歴・トースト
// ============================================================
function addHistory(type, text) {
    const key = `history_${type}`;
    const history = JSON.parse(localStorage.getItem(key) || '[]');
    history.unshift({ text, time: new Date().toLocaleString('ja-JP') });
    if (history.length > 10) history.pop();
    localStorage.setItem(key, JSON.stringify(history));
    renderHistory(type);
}
function renderHistory(type) {
    const key = `history_${type}`;
    const history = JSON.parse(localStorage.getItem(key) || '[]');
    const el = document.getElementById(type === 'receive' ? 'receiveHistory' : 'shipHistory');
    if (!history.length) { el.innerHTML = '<p class="text-gray-400">まだ履歴がありません</p>'; return; }
    el.innerHTML = history.map(h => `
        <div class="flex justify-between items-center bg-gray-50 rounded-lg px-3 py-2">
            <span class="text-xs">${h.text}</span><span class="text-xs text-gray-400 whitespace-nowrap ml-2">${h.time}</span>
        </div>
    `).join('');
}
function showToast(msg, type = 'info') {
    const colors = { success: '#16a34a', error: '#dc2626', warning: '#ea580c', info: '#2563eb' };
    const t = document.createElement('div');
    t.className = 'toast'; t.style.background = colors[type] || colors.info; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3200);
}

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    loadMoldMaster();
    renderRackSelector('rackSelector', onReceiveRackSelect);
    renderRackSelector('inventoryRackSelector', onInventoryRackSelect);
    renderHistory('receive');
    renderHistory('ship');
});
</script>
